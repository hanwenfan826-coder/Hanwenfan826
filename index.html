<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="短视频编导智能体是一个面向创作者、品牌和运营团队的在线工具，可生成短视频选题策划、脚本、分镜、拍摄执行、团队协作、应急方案和数据复盘建议。">
  <meta name="keywords" content="短视频编导,短视频脚本,短视频策划,分镜脚本,拍摄方案,视频运营,短视频智能体,AI编导">
  <meta name="author" content="短视频编导智能体">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="短视频编导智能体">
  <meta property="og:description" content="输入账号定位、主题和目标人群，生成可拍摄、可剪辑、可复盘的短视频编导方案。">
  <meta property="og:locale" content="zh_CN">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="短视频编导智能体">
  <meta name="twitter:description" content="一个在线短视频编导工作台，覆盖策划、脚本、分镜、执行和复盘。">
  <title>短视频编导智能体 - AI短视频策划、脚本与分镜工作台</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #666b72;
      --line: #dadde2;
      --paper: #f7f6f2;
      --panel: #ffffff;
      --accent: #d64030;
      --accent-2: #087f8c;
      --accent-3: #f0b429;
      --deep: #1f2933;
      --soft: #eef3f4;
      --shadow: 0 18px 50px rgba(31, 41, 51, .12);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    button, input, textarea, select { font: inherit; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px;
      background: #20252b;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-3));
      box-shadow: inset 0 -12px 24px rgba(0, 0, 0, .2);
      flex: 0 0 auto;
    }

    .mark svg { width: 24px; height: 24px; fill: none; stroke: #fff; stroke-width: 2.2; }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: #c7d0d9;
      font-size: 12px;
    }

    .agent-card {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: var(--radius);
      padding: 14px;
      background: rgba(255,255,255,.06);
    }

    .agent-card h2 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #eff3f7;
    }

    .ability-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .ability-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #dbe3ea;
      font-size: 13px;
      line-height: 1.35;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-3);
      flex: 0 0 auto;
    }

    .side-bottom {
      margin-top: auto;
      color: #b5c1cc;
      font-size: 12px;
      line-height: 1.6;
    }

    main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .hero {
      position: relative;
      min-height: 430px;
      padding: 34px clamp(20px, 4vw, 56px);
      background:
        linear-gradient(90deg, rgba(247,246,242,.98) 0%, rgba(247,246,242,.9) 44%, rgba(247,246,242,.28) 100%),
        radial-gradient(circle at 85% 18%, rgba(8,127,140,.2), transparent 30%),
        #e5e2d8;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(280px, 520px) minmax(340px, 1fr);
      gap: clamp(24px, 4vw, 48px);
      align-items: center;
    }

    .hero-copy {
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .eyebrow:before {
      content: "";
      width: 22px;
      height: 2px;
      background: var(--accent);
    }

    .hero h2 {
      margin: 0;
      max-width: 11em;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .hero p {
      margin: 18px 0 0;
      max-width: 520px;
      color: #444a51;
      font-size: 17px;
      line-height: 1.75;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(31,41,51,.1); }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.icon { width: 42px; padding: 0; }
    .btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

    .production-visual {
      position: relative;
      z-index: 1;
      min-height: 340px;
      border-radius: 8px;
      overflow: hidden;
      background: #101418;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,.12);
    }

    .visual-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity: .6;
    }

    .phone {
      position: absolute;
      right: 9%;
      top: 10%;
      width: min(170px, 28vw);
      aspect-ratio: 9 / 16;
      border-radius: 28px;
      background: #050607;
      border: 7px solid #31363d;
      box-shadow: 0 20px 38px rgba(0,0,0,.45);
      padding: 14px 10px;
    }

    .phone-screen {
      height: 100%;
      border-radius: 19px;
      background:
        linear-gradient(180deg, rgba(214,64,48,.8), transparent 32%),
        linear-gradient(130deg, #19242d, #0b1115 58%, #087f8c);
      position: relative;
      overflow: hidden;
    }

    .play {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .play svg {
      width: 46px;
      height: 46px;
      fill: rgba(255,255,255,.9);
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.35));
    }

    .timeline {
      position: absolute;
      left: 7%;
      bottom: 10%;
      right: 36%;
      height: 86px;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      padding: 10px;
    }

    .clip {
      border-radius: 5px;
      background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.06));
      position: relative;
      overflow: hidden;
    }

    .clip:after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 28%;
      background: var(--accent-2);
    }

    .board-card {
      position: absolute;
      left: 8%;
      top: 12%;
      width: 230px;
      min-height: 150px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 14px 30px rgba(0,0,0,.28);
      transform: rotate(-3deg);
      padding: 16px;
    }

    .line {
      height: 8px;
      border-radius: 99px;
      background: #d8dde1;
      margin-bottom: 10px;
    }

    .line.short { width: 62%; }
    .line.red { background: var(--accent); width: 42%; }

    .workspace {
      padding: 28px clamp(20px, 4vw, 56px) 42px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 24px;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(280px, 390px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel, .output-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(31,41,51,.06);
    }

    .panel {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: #343941;
      font-weight: 700;
      font-size: 13px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid #cbd1d7;
      border-radius: 8px;
      padding: 11px 12px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(8,127,140,.14);
    }

    .switches {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .toggle {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfbfa;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #333941;
    }

    .toggle input { width: auto; accent-color: var(--accent); }

    .output-panel {
      min-width: 0;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      background: #fbfbfa;
    }

    .tab {
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      min-height: 48px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
      color: #59616b;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--accent);
      background: #fff;
      box-shadow: inset 0 -3px 0 var(--accent);
    }

    .tab-content {
      padding: 20px;
      display: none;
    }

    .tab-content.active { display: block; }

    .brief {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      background: var(--soft);
      min-height: 86px;
    }

    .metric strong {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 12px;
      font-size: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .idea, .shot, .task {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }

    .idea h4, .shot h4, .task h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .idea p, .shot p, .task p {
      margin: 0;
      color: #4d555e;
      line-height: 1.65;
      font-size: 14px;
    }

    .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tag {
      border-radius: 99px;
      background: #f3e9d3;
      color: #6d4f08;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .script-box {
      display: grid;
      gap: 10px;
    }

    .script-line {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .timecode {
      font-weight: 800;
      color: var(--accent);
    }

    .script-line p {
      margin: 0;
      color: #343941;
      line-height: 1.7;
    }

    .shot-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .frame {
      aspect-ratio: 16 / 9;
      border-radius: 6px;
      background:
        linear-gradient(135deg, rgba(8,127,140,.35), transparent),
        #222a31;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .frame:before {
      content: "";
      position: absolute;
      inset: 14% 16%;
      border: 2px solid rgba(255,255,255,.48);
    }

    .frame:after {
      content: "";
      position: absolute;
      left: 12%;
      bottom: 16%;
      width: 46%;
      height: 10%;
      border-radius: 99px;
      background: rgba(255,255,255,.75);
    }

    .task-list {
      display: grid;
      gap: 10px;
    }

    .task {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--accent-2);
      display: grid;
      place-items: center;
      color: var(--accent-2);
      font-weight: 900;
      line-height: 1;
    }

    .empty {
      padding: 38px 20px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
      }
      .hero, .grid { grid-template-columns: 1fr; }
      .production-visual { min-height: 300px; }
      .brief { grid-template-columns: 1fr; }
      .cards, .shot-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .hero { min-height: auto; padding-top: 26px; }
      .hero h2 { font-size: 34px; }
      .workspace { padding-inline: 14px; }
      .toolbar { align-items: stretch; flex-direction: column; }
      .toolbar-actions { justify-content: flex-start; }
      .switches { grid-template-columns: 1fr; }
      .script-line { grid-template-columns: 1fr; }
      .phone { right: 5%; width: 128px; }
      .board-card { width: 180px; }
      .timeline { right: 18%; left: 5%; }
    }
  </style>
</head>
<body>
  <noscript>
    <section style="padding:24px;font-family:Microsoft YaHei,Arial,sans-serif;line-height:1.8">
      <h1>短视频编导智能体</h1>
      <p>这是一个面向短视频创作者、品牌方和运营团队的在线编导工具，支持短视频选题策划、脚本写作、分镜设计、拍摄执行、团队协作、应急预案和数据复盘。</p>
      <p>核心能力包括创作策划能力、脚本与拍摄执行能力、创新与市场洞察力、团队协作能力、快速应变能力、持续学习与数据分析能力。</p>
    </section>
  </noscript>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M9 9l6 3-6 3z"/></svg>
        </div>
        <div>
          <h1>短视频编导智能体</h1>
          <p>策划 / 脚本 / 分镜 / 执行 / 复盘</p>
        </div>
      </div>

      <div class="agent-card">
        <h2>核心能力</h2>
        <ul class="ability-list">
          <li><span class="dot"></span>选题策划与账号定位</li>
          <li><span class="dot"></span>脚本写作与分镜设计</li>
          <li><span class="dot"></span>拍摄、剪辑与现场执行</li>
          <li><span class="dot"></span>热点判断与市场洞察</li>
          <li><span class="dot"></span>团队协同与应急预案</li>
          <li><span class="dot"></span>数据复盘与持续学习</li>
        </ul>
      </div>

      <div class="side-bottom">
        根据账号调性、目标人群、产品卖点和平台环境，生成可落地的短视频制作方案。
      </div>
    </aside>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <div class="eyebrow">AI Director Workspace</div>
          <h2>把创意变成可拍、可剪、可复盘的短视频方案</h2>
          <p>输入主题和目标，系统会同时考虑选题吸引力、脚本逻辑、镜头执行、团队分工、突发风险和数据优化。</p>
          <div class="quick-actions">
            <button class="btn primary" id="heroGenerate">
              <svg viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 10-13h-7z"/></svg>
              生成方案
            </button>
            <button class="btn" id="loadDemo">
              <svg viewBox="0 0 24 24"><path d="M4 4v16h16"/><path d="M8 15l3-3 3 2 5-7"/></svg>
              填入示例
            </button>
          </div>
        </div>

        <div class="production-visual" aria-label="短视频制作工作台视觉图">
          <div class="visual-grid"></div>
          <div class="board-card">
            <div class="line red"></div>
            <div class="line"></div>
            <div class="line short"></div>
            <div class="line"></div>
            <div class="line short"></div>
          </div>
          <div class="phone">
            <div class="phone-screen">
              <div class="play">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
          </div>
          <div class="timeline">
            <div class="clip"></div><div class="clip"></div><div class="clip"></div>
            <div class="clip"></div><div class="clip"></div><div class="clip"></div>
          </div>
        </div>
      </section>

      <section class="workspace" id="workspace">
        <div class="toolbar">
          <h2>编导工作台</h2>
          <div class="toolbar-actions">
            <button class="btn icon" id="copyResult" title="复制方案">
              <svg viewBox="0 0 24 24"><path d="M8 8h12v12H8z"/><path d="M4 16V4h12"/></svg>
            </button>
            <button class="btn icon" id="downloadResult" title="下载文案">
              <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
            </button>
          </div>
        </div>

        <div class="grid">
          <form class="panel form-grid" id="directorForm">
            <label>账号定位
              <input name="positioning" value="新消费品牌官方号，专业但有亲和力">
            </label>
            <label>视频主题
              <input name="topic" value="一款低糖气泡茶的夏季上新">
            </label>
            <label>目标用户
              <input name="audience" value="20-35 岁关注控糖、通勤、轻健康的人群">
            </label>
            <label>核心卖点
              <textarea name="selling">低糖、真实茶香、开罐即饮、适合办公室和户外场景</textarea>
            </label>
            <label>发布平台
              <select name="platform">
                <option>抖音</option>
                <option>小红书</option>
                <option>视频号</option>
                <option>B 站</option>
              </select>
            </label>
            <label>视频时长
              <select name="duration">
                <option>30 秒</option>
                <option>15 秒</option>
                <option>60 秒</option>
                <option>90 秒</option>
              </select>
            </label>
            <label>内容风格
              <select name="style">
                <option>剧情种草</option>
                <option>测评讲解</option>
                <option>街采互动</option>
                <option>教程清单</option>
                <option>热点借势</option>
              </select>
            </label>
            <div class="switches" aria-label="策略选项">
              <label class="toggle"><input type="checkbox" name="trend" checked>结合热点趋势</label>
              <label class="toggle"><input type="checkbox" name="conversion" checked>强化转化路径</label>
              <label class="toggle"><input type="checkbox" name="team" checked>输出团队分工</label>
              <label class="toggle"><input type="checkbox" name="risk" checked>包含应急方案</label>
            </div>
            <button class="btn primary" type="submit">
              <svg viewBox="0 0 24 24"><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg>
              生成编导方案
            </button>
          </form>

          <section class="output-panel">
            <div class="tabs" role="tablist">
              <button class="tab active" data-tab="strategy">策划</button>
              <button class="tab" data-tab="script">脚本</button>
              <button class="tab" data-tab="storyboard">分镜</button>
              <button class="tab" data-tab="execution">执行</button>
              <button class="tab" data-tab="review">复盘</button>
            </div>
            <div id="result">
              <div class="empty">填写左侧信息后生成方案。默认示例已经填好，可以直接点击生成。</div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    const form = document.getElementById("directorForm");
    const result = document.getElementById("result");
    const workspace = document.getElementById("workspace");
    let latestPlan = "";

    const templates = {
      "剧情种草": {
        hook: "用一个具体生活冲突开场，让观众在 3 秒内看到自己。",
        tone: "轻剧情、快节奏、结尾自然引导购买或收藏。"
      },
      "测评讲解": {
        hook: "用对比实验或真实试喝反应建立可信度。",
        tone: "结构清晰，信息密度高，镜头干净。"
      },
      "街采互动": {
        hook: "用路人第一反应制造真实感和社交证明。",
        tone: "现场感强，保留自然停顿和表情。"
      },
      "教程清单": {
        hook: "用清单式痛点解决方案提高收藏率。",
        tone: "步骤明确，字幕和画面信息同步。"
      },
      "热点借势": {
        hook: "把热点情绪转译成品牌可承接的内容角度。",
        tone: "反应快，但不牺牲账号调性和事实准确。"
      }
    };

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      })[char]);
    }

    function readForm() {
      const data = new FormData(form);
      return {
        positioning: data.get("positioning").trim(),
        topic: data.get("topic").trim(),
        audience: data.get("audience").trim(),
        selling: data.get("selling").trim(),
        platform: data.get("platform"),
        duration: data.get("duration"),
        style: data.get("style"),
        trend: data.get("trend") === "on",
        conversion: data.get("conversion") === "on",
        team: data.get("team") === "on",
        risk: data.get("risk") === "on"
      };
    }

    function makePlan(d) {
      const style = templates[d.style] || templates["剧情种草"];
      const trendLine = d.trend ? "结合近期平台热门情绪词、季节场景和评论区高频问题，优先选择容易被转发讨论的切入点。" : "保持账号长期栏目稳定，不强行追热点。";
      const conversionLine = d.conversion ? "在结尾设置低阻力动作：评论关键词、进店领取、收藏清单或私信咨询。" : "以品牌记忆和互动为主，不做强转化。";
      return {
        brief: [
          ["3 秒钩子", style.hook],
          ["内容定位", `${d.positioning} 面向 ${d.audience}`],
          ["转化路径", conversionLine]
        ],
        ideas: [
          {
            title: `选题 A：${d.topic} 的真实使用瞬间`,
            body: `从用户日常痛点切入，用一个具体场景承接卖点：${d.selling}。`,
            tags: ["共鸣", d.platform, d.style]
          },
          {
            title: "选题 B：反常识开场",
            body: `先抛出一个与 ${d.audience} 相关的误区，再用产品和场景完成解释，提升停留。`,
            tags: ["停留率", "知识点", "评论"]
          },
          {
            title: "选题 C：评论区问题回应",
            body: `把用户最可能问的价格、口味、适用场景做成连续回答，方便后续形成栏目。`,
            tags: ["系列化", "复用", "转化"]
          },
          {
            title: "市场洞察",
            body: `${trendLine} 内容必须贴合账号调性，避免只追热闹而削弱品牌识别。`,
            tags: ["趋势", "定位", "学习"]
          }
        ],
        script: [
          ["0-3s", `画面快速呈现痛点：${d.audience} 在通勤或工作间隙需要轻负担饮品。旁白提出冲突：“想喝点有味道的，又怕负担太重？”`],
          ["3-8s", `产品进入场景，突出 ${d.selling}。镜头用近景展示开罐、气泡、茶汤质感。`],
          ["8-16s", `用一个微剧情或小实验证明卖点：同事试喝、户外补水、办公室下午茶任选其一。`],
          ["16-24s", `补充信任信息：口味、饮用场景、适合人群。画面节奏加快，字幕只保留关键词。`],
          ["24-30s", `${conversionLine} 结尾回到账号定位，形成可记住的一句话。`]
        ],
        shots: [
          ["开场冲突", "中近景", "人物或手部动作先出现，声音先于画面，制造注意力。"],
          ["产品亮相", "特写", "开罐、气泡、瓶身水珠和茶色，用自然光强化清爽感。"],
          ["场景证明", "跟拍", "办公室、地铁口、露营桌三选一，镜头保持真实速度。"],
          ["卖点强化", "俯拍", "用桌面道具做信息分层，不堆满文字。"],
          ["互动转化", "正面近景", "演员直视镜头给出评论或购买动作。"],
          ["备用镜头", "空镜", "补拍环境、手部、产品陈列，给剪辑留余量。"]
        ],
        execution: [
          ["导演", "统一创意意图，现场判断表演、节奏和补拍镜头。"],
          ["摄影", "提前确认景别、运动、光线和收音位置。"],
          ["演员", "台词口语化，不背广告词，优先保留真实反应。"],
          ["剪辑", "前 3 秒强钩子，字幕跟随信息点，音乐卡点但不抢内容。"],
          ["应急", d.risk ? "若场地延误，切换到桌面测评版脚本；若素材丢失，用备用空镜和旁白补齐逻辑。" : "保持常规拍摄流程。"],
          ["协作", d.team ? "拍前 15 分钟对齐分镜表、道具表、台词版本和发布目标。" : "由编导统一推进。"]
        ],
        review: [
          ["播放完成率", "重点看 3 秒、5 秒、完播三段流失，判断钩子和节奏。"],
          ["互动质量", "区分真实问题、情绪评论和无效互动，提炼下一条选题。"],
          ["转化动作", "观察评论关键词、主页访问、商品点击或私信咨询。"],
          ["持续学习", "每周复盘爆款结构、剪辑手法、平台规则和同类账号变化。"]
        ]
      };
    }

    function renderPlan(data) {
      const plan = makePlan(data);
      latestPlan = [
        `短视频编导方案：${data.topic}`,
        `账号定位：${data.positioning}`,
        `目标用户：${data.audience}`,
        `核心卖点：${data.selling}`,
        "",
        "策划：",
        ...plan.ideas.map(item => `- ${item.title}：${item.body}`),
        "",
        "脚本：",
        ...plan.script.map(item => `- ${item[0]} ${item[1]}`),
        "",
        "分镜：",
        ...plan.shots.map(item => `- ${item[0]} / ${item[1]}：${item[2]}`),
        "",
        "执行：",
        ...plan.execution.map(item => `- ${item[0]}：${item[1]}`),
        "",
        "复盘：",
        ...plan.review.map(item => `- ${item[0]}：${item[1]}`)
      ].join("\n");

      result.innerHTML = `
        <div class="tab-content active" data-panel="strategy">
          <div class="brief">
            ${plan.brief.map(item => `<div class="metric"><strong>${escapeHTML(item[0])}</strong><span>${escapeHTML(item[1])}</span></div>`).join("")}
          </div>
          <h3 class="section-title">选题与市场判断</h3>
          <div class="cards">
            ${plan.ideas.map(item => `
              <article class="idea">
                <h4>${escapeHTML(item.title)}</h4>
                <p>${escapeHTML(item.body)}</p>
                <div class="tag-row">${item.tags.map(tag => `<span class="tag">${escapeHTML(tag)}</span>`).join("")}</div>
              </article>
            `).join("")}
          </div>
        </div>
        <div class="tab-content" data-panel="script">
          <h3 class="section-title">可拍摄脚本</h3>
          <div class="script-box">
            ${plan.script.map(item => `<div class="script-line"><div class="timecode">${escapeHTML(item[0])}</div><p>${escapeHTML(item[1])}</p></div>`).join("")}
          </div>
        </div>
        <div class="tab-content" data-panel="storyboard">
          <h3 class="section-title">分镜设计</h3>
          <div class="shot-grid">
            ${plan.shots.map(item => `
              <article class="shot">
                <div class="frame"></div>
                <h4>${escapeHTML(item[0])} · ${escapeHTML(item[1])}</h4>
                <p>${escapeHTML(item[2])}</p>
              </article>
            `).join("")}
          </div>
        </div>
        <div class="tab-content" data-panel="execution">
          <h3 class="section-title">拍摄执行与团队协作</h3>
          <div class="task-list">
            ${plan.execution.map(item => `<article class="task"><div class="check">✓</div><div><h4>${escapeHTML(item[0])}</h4><p>${escapeHTML(item[1])}</p></div></article>`).join("")}
          </div>
        </div>
        <div class="tab-content" data-panel="review">
          <h3 class="section-title">数据复盘与持续学习</h3>
          <div class="task-list">
            ${plan.review.map(item => `<article class="task"><div class="check">✓</div><div><h4>${escapeHTML(item[0])}</h4><p>${escapeHTML(item[1])}</p></div></article>`).join("")}
          </div>
        </div>
      `;
      activateTab("strategy");
    }

    function activateTab(name) {
      document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.tab === name));
      document.querySelectorAll(".tab-content").forEach(panel => panel.classList.toggle("active", panel.dataset.panel === name));
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => activateTab(tab.dataset.tab));
    });

    form.addEventListener("submit", event => {
      event.preventDefault();
      renderPlan(readForm());
    });

    document.getElementById("heroGenerate").addEventListener("click", () => {
      renderPlan(readForm());
      workspace.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    document.getElementById("loadDemo").addEventListener("click", () => {
      form.positioning.value = "本地生活探店账号，真实、轻松、有判断力";
      form.topic.value = "一家新开的深夜面馆如何在 30 秒内种草";
      form.audience.value = "22-40 岁喜欢夜宵、下班放松、重视性价比的人群";
      form.selling.value = "现熬汤底、开放厨房、凌晨营业、单人也舒服";
      form.platform.value = "小红书";
      form.duration.value = "30 秒";
      form.style.value = "剧情种草";
      renderPlan(readForm());
      workspace.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    document.getElementById("copyResult").addEventListener("click", async () => {
      if (!latestPlan) renderPlan(readForm());
      try {
        await navigator.clipboard.writeText(latestPlan);
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = latestPlan;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
    });

    document.getElementById("downloadResult").addEventListener("click", () => {
      if (!latestPlan) renderPlan(readForm());
      const blob = new Blob([latestPlan], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "short-video-director-plan.txt";
      link.click();
      URL.revokeObjectURL(link.href);
    });
  </script>
</body>
</html>
